websocket:
  listen: "0.0.0.0"
  port: 8443
  stream_path: "/v1/stream"
  client_id_header: "X-Hardware-Id"
  tls:
    cert_file: "configs/certs/dev-server.crt"
    key_file: "configs/certs/dev-server.key"
  rtt_interval: "10s"
  read_timeout: "30s"
  write_timeout: "10s"
  max_message_bytes: 1048576
  stream:
    sample_rate: 8000
    channels: 1

session:
  close_timeout: "3s"
  idle_timeout: "0s"

controller:
  initial_silence_timeout: "15s"
  silence_timeout: "5s"
  reference_queue_size: 16

pipeline:
  uplink_queue_size: 32
  downlink_queue_size: 32
  target_sample_rate: 8000
  target_channels: 1
  sample_format: "pcm16le"
  debug_pcm_dir: "runtime/pcm"
  uplink:
    queue_size: 32
    on_error: "drop"
    stages:
      - name: "base64_decode"
        enabled: true
      - name: "alaw_decode"
        enabled: true
      - name: "aec_agc_ans_mock"
        enabled: true
      - name: "vad_mock"
        enabled: true
  downlink:
    queue_size: 32
    on_error: "drop"
    stages:
      - name: "pcm_normalize"
        enabled: true
        params:
          sample_rate: 8000
          channels: 1
      - name: "reference_tap"
        enabled: true
      - name: "alaw_encode"
        enabled: true
      - name: "base64_encode"
        enabled: true

logging:
  level: "info"
  format: "text"

webrtc:
  enabled: false
  # 未来接入 WebRTC 时在这里配置 ICE/STUN/TURN、RTP codec 和 GStreamer pipeline。
